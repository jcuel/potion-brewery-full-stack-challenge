name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, smoke tests & bug-fix regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm run setup

      - name: Typecheck and build backend
        id: build-backend
        run: npm run build --prefix backend

      - name: Typecheck and build frontend
        id: build-frontend
        run: npm run build --prefix frontend

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for backend and frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health >/dev/null &&
            curl -sf http://localhost:3000/ >/dev/null &&
            echo "Services ready" && exit 0
            echo "Waiting for services ($i/30)..."
            sleep 2
          done
          echo "Services did not become ready in time"
          docker compose logs
          exit 1

      - name: Run unit tests
        run: |
          mkdir -p reports
          npm run test:unit 2>&1 | tee reports/test-unit.log

      - name: Run integration smoke tests
        run: npm run test:smoke 2>&1 | tee reports/test-smoke.log

      - name: Write test results summary
        if: always()
        run: |
          mkdir -p reports
          cat > reports/ci-results.json <<EOF
          {
            "passed": ${{ job.status == 'success' }},
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "expectedTests": {
              "frontendUnit": 8,
              "backendUnit": 7,
              "integrationSmoke": 7,
              "total": 22
            },
            "suites": [
              "frontend/src/utils/validation.test.ts — Bug 1 & 2b regression",
              "backend/src/api/potions.smoke.test.ts + validation.smoke.test.ts — Bug 1 & 2a",
              "tests/smoke/integration.test.ts — REST, GraphQL, proxy, API validation"
            ]
          }
          EOF

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results
          path: reports/
          if-no-files-found: warn

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## CI — Build, smoke tests & regression"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Backend \`tsc\` build | ${{ steps.build-backend.outcome == 'success' && '✅' || '❌' }} |"
            echo "| Frontend \`tsc + vite build\` | ${{ steps.build-frontend.outcome == 'success' && '✅' || '❌' }} |"
            echo "| Unit + integration (22 tests) | ${{ job.status == 'success' && '✅' || '❌' }} |"
            echo ""
            echo "**Docs:** [ARCHITECTURE.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/ARCHITECTURE.md) · [BUGFIXES.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/BUGFIXES.md)"
            echo ""
            echo "[Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'cancelled'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          mkdir -p reports
          docker compose build

      - name: Scan backend image (app libraries — blocking)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: demo-backend
          format: table
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: library
          exit-code: '1'
          output: reports/trivy-demo-backend.txt
          trivy-config: trivy.yaml

      - name: Scan frontend image (app libraries — blocking)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: demo-frontend
          format: table
          severity: HIGH,CRITICAL
          scanners: vuln
          vuln-type: library
          exit-code: '1'
          output: reports/trivy-demo-frontend.txt
          trivy-config: trivy.yaml

      - name: Scan backend image (full — informational)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: demo-backend
          format: sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          output: reports/trivy-backend-full.sarif
          trivy-config: trivy.yaml

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('reports/trivy-backend-full.sarif') != ''
        with:
          sarif_file: reports/trivy-backend-full.sarif
          category: trivy-backend

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: reports/
          if-no-files-found: ignore

  report:
    name: Post PR results
    runs-on: ubuntu-latest
    needs: [test, trivy]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ci-test-results
          path: reports
          merge-multiple: true

      - name: Download Trivy artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-reports
          path: reports
          merge-multiple: true

      - name: Build PR comment
        env:
          TEST_JOB_RESULT: ${{ needs.test.result }}
          TRIVY_JOB_RESULT: ${{ needs.trivy.result }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node scripts/format-pr-comment.mjs

      - name: Post results on pull request
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-tag: potion-brewery-ci-results
          issue-number: ${{ github.event.pull_request.number }}
          body-path: reports/pr-comment.md
