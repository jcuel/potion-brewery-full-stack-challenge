services:
  backend:
    image: demo-backend
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
    volumes:
      - ./images:/images:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    image: demo-frontend
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
